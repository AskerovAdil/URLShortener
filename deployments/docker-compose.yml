services:
  api:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    ports:
      - "8080:8080"
    environment:
      URLSHORTENER_LOG_LEVEL: info
      URLSHORTENER_LOG_DEVELOPMENT: "false"
      URLSHORTENER_POSTGRES_HOST: postgres
      URLSHORTENER_POSTGRES_PORT: "5432"
      URLSHORTENER_POSTGRES_USER: urlshortener
      URLSHORTENER_POSTGRES_PASSWORD: urlshortener
      URLSHORTENER_POSTGRES_DATABASE: urlshortener
      URLSHORTENER_POSTGRES_SSL_MODE: disable
      URLSHORTENER_REDIS_ADDR: redis:6379
      URLSHORTENER_MIGRATIONS_RUN_ON_STARTUP: "true"
      URLSHORTENER_JWT_SECRET: dev-secret-change-me-in-production-32chars
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: urlshortener
      POSTGRES_PASSWORD: urlshortener
      POSTGRES_DB: urlshortener
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urlshortener -d urlshortener"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
