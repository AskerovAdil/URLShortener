server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 10s
  write_timeout: 10s
  shutdown_timeout: 15s

log:
  level: debug
  development: true

app:
  base_url: http://localhost:8080

postgres:
  host: localhost
  port: 5432
  user: urlshortener
  password: urlshortener
  database: urlshortener
  ssl_mode: disable

redis:
  addr: localhost:6379
  password: ""
  db: 0

cache:
  url_ttl: 1h

migrations:
  path: migrations
  run_on_startup: true

jwt:
  secret: dev-secret-change-me-in-production-32chars
  ttl: 24h
